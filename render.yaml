services:
  - type: web
    name: silent-voice-demo
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///silent_voice.db
